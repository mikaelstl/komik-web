<app-bar />
<div class="kmk-library-content">
  <div class="kmk-reading">
    <div class="kmk-reading-header">
      <div class="leading">
        <ng-icon name="heroBookmarkSolid" size="20" />
        <kmk-title>Reading</kmk-title>
      </div>
      <div class="trailing">
        <highlight-caption>Ver tudo (0)</highlight-caption>
        <!-- <ng-icon name="heroChevronDownSolid" size="20"/> -->
        <ng-icon class="chevron-up" name="heroChevronUpSolid" size="20"/>
      </div>
    </div>
    <div class="kmk-reading-comics">
      <!-- @for (comic of comics; track $index) {
        <comic-vcard />
      } -->
    </div>
  </div>
  <div class="kmk-comics-area">
    @for (comic of comics(); track comic.id) {
      <comic-vcard
        [title]="comic.title"
        [subtitle]="comic.subtitle"
        [edition]="comic.edition"
        [cover]="createCoverURL(comic.cover)"
      />
    } @empty {
      <italic-title>Without Comics</italic-title>
    }
  </div>
</div>
